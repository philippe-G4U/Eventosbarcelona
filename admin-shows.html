<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Eventos Barcelona</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="/admin.html">
  <script>
    // Backwards-compat alias: admin-shows.html → admin.html#shows
    // Preserve hash if user already navigated within the new app via this URL.
    (function () {
      var h = location.hash || '';
      var target = '/admin.html';
      if (h && /^#(artistas|shows|propuestas)/.test(h)) {
        target += h;
      } else {
        target += '#shows';
      }
      location.replace(target);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/admin.html#shows">
  </noscript>
</head>
<body>
  <p style="font-family: -apple-system, sans-serif; padding: 32px;">
    Redirigiendo a <a href="/admin.html#shows">/admin.html</a>…
  </p>
</body>
</html>
